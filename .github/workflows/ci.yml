name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux Swift 6.1.3
    runs-on: ubuntu-24.04

    # Linux runner instead of macOS.
    # Pinned official Swift 6.1.x image for repeatable package validation.
    container:
      image: swift:6.1.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build root package
        run: swift build

      - name: Test root package
        run: swift test

      - name: Build SwiftNIO echo example
        run: swift build --package-path Examples/NIOTCPEchoAdmissionServer
